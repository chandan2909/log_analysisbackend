# ============================================================
# AI Log Analyzer - Application Configuration
# ============================================================

# Server — Render uses PORT env var
server.port=${PORT:8080}

# ============================================================
# Aiven MySQL Configuration (SSL Required)
# Credentials loaded from environment variables
# ============================================================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslMode=REQUIRED
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=${JWT_SECRET:defaultSecretKeyThatShouldBeChangedInProductionMinimum64CharactersLong1234567890}
app.jwt.expiration-ms=86400000

# ============================================================
# CORS — Set CORS_ORIGINS in production (comma-separated)
# Example: https://your-app.vercel.app,https://custom-domain.com
# ============================================================
app.cors.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.loganalyzer=INFO
logging.level.org.springframework.security=WARN
